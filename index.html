<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triveni Terrace Cafe</title>
    <script>
      (function() {
        const originalFetch = window.fetch;
        if (typeof originalFetch !== "function") return;
        try {
          // Attempt to redefine directly on window to make it writable
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          try {
            // Fallback: Add a dummy setter to the prototype if it has a getter-only 'fetch'
            const proto = Object.getPrototypeOf(window);
            const desc = Object.getOwnPropertyDescriptor(proto, 'fetch');
            if (desc && desc.get && !desc.set) {
              Object.defineProperty(proto, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { console.warn('Blocked attempt to overwrite window.fetch on prototype.'); },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e2) {}
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
