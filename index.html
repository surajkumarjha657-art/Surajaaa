<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Triveni Terrace Cafe</title>
    <script>
      // Ultimate fetch protection: some environments define window.fetch as a read-only getter.
      // This script attempts to force it into a standard writable property to prevent crashes
      // from polyfills or libraries that try to overwrite it (e.g., node-fetch, whatwg-fetch).
      (function() {
        try {
          const originalFetch = window.fetch;
          if (typeof originalFetch !== 'function') return;
          
          // Try redefining directly on window
          Object.defineProperty(window, 'fetch', {
            value: originalFetch,
            writable: true,
            configurable: true,
            enumerable: true
          });
          
          // Also handle Global if it exists
          if (typeof globalThis !== 'undefined' && globalThis.fetch && globalThis !== window) {
             Object.defineProperty(globalThis, 'fetch', {
              value: originalFetch,
              writable: true,
              configurable: true,
              enumerable: true
            });
          }
          
          console.log('window.fetch prioritized and stabilized.');
        } catch (e) {
          // If defineProperty fails on window (rare), try adding a setter to potentially 
          // problematic prototypes
          [window, Object.getPrototypeOf(window), Window.prototype].forEach(target => {
            try {
              const descriptor = Object.getOwnPropertyDescriptor(target, 'fetch');
              if (descriptor && descriptor.get && !descriptor.set) {
                Object.defineProperty(target, 'fetch', {
                  get: function() { return window.fetch || originalFetch; },
                  set: function(v) { console.warn('Blocked fetch override attempt on', target); },
                  configurable: true
                });
              }
            } catch (innerE) {}
          });
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
